# GitHub Actions Pipeline — CIS audit + backup + docs
# Requires GitHub Secrets: RESTIC_PASSWORD, S3_ACCESS_KEY, S3_SECRET_KEY, etc.

name: Server Provisioning

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CIS_TARGET: 95

jobs:
  setup:
    name: Setup & Harden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y restic

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          RESTIC_PASSWORD='${{ secrets.RESTIC_PASSWORD }}'
          S3_ACCESS_KEY='${{ secrets.S3_ACCESS_KEY }}'
          S3_SECRET_KEY='${{ secrets.S3_SECRET_KEY }}'
          S3_BUCKET='${{ secrets.S3_BUCKET }}'
          S3_ENDPOINT='${{ secrets.S3_ENDPOINT }}'
          YANDEX_DISK_TOKEN='${{ secrets.YANDEX_DISK_TOKEN }}'
          EOF
          chmod 600 .env

      - name: Run CIS audit
        run: python3 cis/manager.py audit --format json

      - name: Apply CIS fixes
        run: python3 cis/manager.py fix --force

      - name: Re-audit after fixes
        run: python3 cis/manager.py audit --format json --output cis/data/audit_after_fix.json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: cis/data/
          retention-days: 30

  verify:
    name: Verify Compliance
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download audit report
        uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: cis/data/

      - name: Check compliance score
        run: python3 cis/check_compliance.py --threshold ${{ env.CIS_TARGET }}

  backup:
    name: Create 1-2-1 Backup
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y restic

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          RESTIC_PASSWORD='${{ secrets.RESTIC_PASSWORD }}'
          S3_ACCESS_KEY='${{ secrets.S3_ACCESS_KEY }}'
          S3_SECRET_KEY='${{ secrets.S3_SECRET_KEY }}'
          S3_BUCKET='${{ secrets.S3_BUCKET }}'
          S3_ENDPOINT='${{ secrets.S3_ENDPOINT }}'
          YANDEX_DISK_TOKEN='${{ secrets.YANDEX_DISK_TOKEN }}'
          EOF
          chmod 600 .env

      - name: Create backup
        run: python3 backup/backup.py create
        env:
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}

  docs:
    name: Generate Documentation
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download audit report
        uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: cis/data/

      - name: Generate README
        run: python3 deploy/docs_generator.py

      - name: Commit documentation
        run: |
          git config --global user.name "AI Employee"
          git config --global user.email "devops@base-mais-server-setup"
          git add README.md
          git commit -m "docs: update README with latest CIS audit results" || echo "No changes"
          git push
